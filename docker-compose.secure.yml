# Secure / hardened docker-compose for Dark-Moon.
# The MCP server still needs Docker exec access to run tools in the darkmoon toolbox
# container, so Docker access is isolated behind a local socket proxy instead of
# mounting the host Docker socket into the LLM/OpenCode container.
# NOTES:
# - Replace image tags with vetted, signed images.
# - Provide secrets via your secret-store or a local .opencode.env that is not committed.

networks:
  darkmoon_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: darkmoon_br
    # Do NOT set internal: true if you need outbound internet to LLMs; instead control egress via host firewall / proxy.

volumes:
  darkmoon_home:
  darkmoon_out:
  opencode_home:
  opencode_config:
  opencode_data:
  opencode_agents:
  darkmoon_reports:
  darkmoon_sessions:
  darkmoon_workflows:

services:

  # Darkmoon runtime/toolbox
  darkmoon:
    image: ascit/darkmoon:latest
    container_name: darkmoon
    # Do not run in host network mode
    networks:
      - darkmoon_net
    # Run as non-root user if image supports it; adjust UID:GID to your hardened admin user
    user: "1000:1000"
    # Remove privileged capabilities; drop all and only add minimal if needed
    cap_drop:
      - ALL
    # Enforce no new privileges
    security_opt:
      - no-new-privileges:true
    # Resource limits (compose may not enforce deploy limits outside swarm; set where supported)
    mem_limit: 4g
    cpus: 1.0
    # Filesystem: make root read-only and provide tmpfs for writable paths
    read_only: true
    tmpfs:
      - /tmp:size=1g,mode=1777
      - /run:size=64m,mode=755
    # Minimal required mounts (avoid mounting host Docker socket)
    volumes:
      - darkmoon_home:/home/darkmoon:rw
      - darkmoon_out:/opt/darkmoon/out:rw
      # If you need to mount kube config, prefer a scoped copy (read-only) instead of full host path:
      # - ./kube/scoped-kubeconfig:/home/darkmoon/.kube/config:ro
    environment:
      - DM_MODE=default
      - HOME=/home/darkmoon
      - XDG_CACHE_HOME=/home/darkmoon/.cache
      - XDG_CONFIG_HOME=/home/darkmoon/.config
      - XDG_DATA_HOME=/home/darkmoon/.local/share
      - LANG=C.UTF-8
      - TERM=xterm-256color
    # Avoid exposing unnecessary host ports. Only expose what's required.
    ports:
      - "9222:9222" # if headless browser remote debugging required
    restart: unless-stopped

  # Narrow Docker API proxy used by MCP for container exec.
  # This is safer than giving OpenCode direct access to /var/run/docker.sock.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: darkmoon-docker-proxy
    networks:
      - darkmoon_net
    read_only: true
    tmpfs:
      - /run:size=64m,mode=755
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.25
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOG_LEVEL=warning
      - PING=1
      - VERSION=1
      - CONTAINERS=1
      - EXEC=1
      - POST=1
    restart: unless-stopped

  # OpenCode (AI brain + agents)
  opencode:
    image: ascit/opencode-darkmoon:latest
    container_name: opencode
    networks:
      - darkmoon_net
    depends_on:
      - darkmoon
      - docker-proxy
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 6g
    cpus: 2.0
    read_only: true
    tmpfs:
      - /tmp:size=1g,mode=1777
      - /run:size=64m,mode=755
    stdin_open: true
    tty: true
    restart: unless-stopped
    env_file:
      - ./.opencode.env       # prefer this file to be created from secrets at deploy time (not stored in repo)
    volumes:
      # No direct /var/run/docker.sock mount here; MCP uses DOCKER_HOST below.
      - opencode_home:/home/darkmoon:rw
      - opencode_config:/home/darkmoon/.config/opencode:rw
      - opencode_data:/home/darkmoon/.local/share/opencode:rw
      - opencode_agents:/home/darkmoon/.opencode/agents:rw
      - darkmoon_reports:/home/darkmoon/.local/share/opencode/reports:rw
      - darkmoon_sessions:/home/darkmoon/.local/share/opencode/sessions:rw
      - darkmoon_workflows:/opt/darkmoon/mcp/server/src/tools/workflows/:rw
    environment:
      - HOME=/home/darkmoon
      - OPENCODE_HOME=/home/darkmoon
      - XDG_CACHE_HOME=/home/darkmoon/.cache
      - XDG_CONFIG_HOME=/home/darkmoon/.config
      - XDG_DATA_HOME=/home/darkmoon/.local/share
      - OPENCODE_AGENTS_DIR=/home/darkmoon/.opencode/agents
      - OPENCODE_SESSIONS_DIR=/home/darkmoon/.local/share/opencode/sessions
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOCKER_CONTAINER_NAME=darkmoon
      - TERM=xterm-256color
      - LANG=C.UTF-8
    # If outbound traffic to LLM provider must go through a proxy, set HTTP(S)_PROXY env vars here:
    # environment:
    #   - HTTP_PROXY=http://10.0.0.10:3128
    #   - HTTPS_PROXY=http://10.0.0.10:3128

# End of compose
