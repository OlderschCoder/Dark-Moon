name: darkmoon-stack

volumes:
  darkmoon_opencode:

services:

  darkmoon:
    image: ascit/darkmoon:latest
    container_name: darkmoon
    user: "0:0"
    network_mode: "host"

    environment:
      - DM_MODE=default

    ports:
      - "9222:9222"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.kube:/root/.kube:ro

    cap_add:
      - NET_RAW
      - NET_ADMIN

    restart: unless-stopped


  opencode:
    image: ascit/opencode-darkmoon:latest
    container_name: opencode
    stdin_open: true
    tty: true
    restart: unless-stopped

    env_file:
      - ./.opencode.env

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./darkmoon-settings:/root/.config/opencode/:rw
      - ./darkmoon-settings:/root/.local/share/opencode/:rw
      - ./darkmoon-settings/agents:/root/.opencode/agents/:rw
      - ./reports:/root/.local/share/opencode/reports/:rw
      - ./sessions:/root/.local/share/opencode/sessions/:rw
      - ./workflows:/opt/darkmoon/mcp/server/src/tools/workflows/:rw

    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8