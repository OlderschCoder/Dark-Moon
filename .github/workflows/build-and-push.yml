name: Build & Push Darkmoon

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_opencode:
        description: 'Build & Push opencode-darkmoon (x86)'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-opencode:
    name: Build & Push opencode-darkmoon (x86)
    runs-on: runner-ovh-prod
    if: ${{ github.event_name == 'push' || inputs.build_opencode == true }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Purge Docker
        run: |
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          docker rmi -f $(docker images -aq) 2>/dev/null || true
          docker volume rm $(docker volume ls -q) 2>/dev/null || true
          docker network rm $(docker network ls -q | grep -v -E '^(bridge|host|none)$') 2>/dev/null || true
          docker builder prune -a -f 2>/dev/null || true

      - name: Build & Push opencode image
        run: |
          mkdir -p /tmp/docker-config
          echo '{"credsStore":""}' > /tmp/docker-config/config.json
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker --config /tmp/docker-config login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker build -f Dockerfile.opencode \
            -t ascit/${{ secrets.OPENCODE_IMAGE_NAME }}:latest \
            -t ascit/${{ secrets.OPENCODE_IMAGE_NAME }}:${{ github.sha }} \
            .
          docker --config /tmp/docker-config push ascit/${{ secrets.OPENCODE_IMAGE_NAME }}:latest
          docker --config /tmp/docker-config push ascit/${{ secrets.OPENCODE_IMAGE_NAME }}:${{ github.sha }}
